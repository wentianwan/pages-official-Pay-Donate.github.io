<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM TERMINAL - DOMAIN VALIDATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        
        body {
            background-color: #000;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            overflow: hidden;
        }
        
        .terminal {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            border: none;
            border-radius: 0;
            overflow: hidden;
            position: relative;
        }
        
        .header {
            background-color: #001100;
            padding: 8px 15px;
            border-bottom: 1px solid #0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        
        .title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            letter-spacing: 1px;
        }
        
        .status {
            font-size: 0.85rem;
            padding: 3px 8px;
            border-radius: 0;
            background-color: #000;
            border: 1px solid #0f0;
        }
        
        .status.connected {
            color: #0f0;
            animation: pulse 2s infinite;
        }
        
        .status.disconnected {
            color: #f00;
            border-color: #f00;
        }
        
        .content {
            padding: 60px 20px 80px 20px;
            height: 100vh;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        
        .content::-webkit-scrollbar {
            width: 10px;
            background: #000;
        }
        
        .content::-webkit-scrollbar-thumb {
            background: #0f0;
            border: 1px solid #000;
        }
        
        .line {
            margin-bottom: 5px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .prompt {
            color: #0f0;
            font-weight: bold;
        }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: #0f0;
            vertical-align: middle;
            animation: blink 1s infinite;
            margin-left: 2px;
        }
        
        .info-label {
            color: #0a0;
        }
        
        .info-value {
            color: #fff;
        }
        
        .domain-item {
            padding: 3px 0;
            border-left: 2px solid #0f0;
            padding-left: 10px;
            margin: 5px 0;
        }
        
        .domain-name {
            color: #0f0;
            font-weight: bold;
        }
        
        .domain-status {
            font-size: 0.85rem;
            padding: 2px 6px;
            margin-left: 10px;
            display: inline-block;
        }
        
        .domain-status.verified {
            color: #0f0;
            border: 1px solid #0f0;
        }
        
        .domain-status.pending {
            color: #ff0;
            border: 1px solid #ff0;
        }
        
        .domain-status.failed {
            color: #f00;
            border: 1px solid #f00;
        }
        
        .token-info {
            margin-top: 15px;
            padding: 10px;
            background-color: #001100;
            border-left: 3px solid #0f0;
            font-size: 0.85rem;
        }
        
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 15px;
            background-color: #001100;
            border-top: 1px solid #0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .timestamp {
            font-size: 0.8rem;
            color: #0a0;
        }
        
        .input-line {
            display: flex;
            align-items: center;
        }
        
        .input-prompt {
            color: #0f0;
            margin-right: 8px;
            font-weight: bold;
        }
        
        #commandInput {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
            caret-color: #0f0;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .loading {
            color: #ff0;
        }
        
        .error {
            color: #f00;
        }
        
        .success {
            color: #0f0;
        }
        
        .glitch {
            animation: glitch 3s infinite;
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 0, 0.3), transparent);
            animation: scan 8s linear infinite;
            z-index: 99;
            pointer-events: none;
        }
        
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }
        
        @media (max-width: 768px) {
            .content {
                font-size: 0.85rem;
                padding: 50px 10px 70px 10px;
            }
            
            .title {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <canvas class="matrix-bg" id="matrixCanvas"></canvas>
    
    <div class="terminal">
        <div class="header">
            <div class="title">[ SYSTEM TERMINAL v68 ] 文天玩官方域名验证器</div>
            <div class="status connected" id="connectionStatus">● CONNECTED</div>
        </div>
        
        <div class="content" id="terminalContent">
        </div>
        
        <div class="footer">
            <div class="timestamp" id="lastUpdate">LAST UPDATE: WAITING...</div>
            <div class="input-line">
                <span class="input-prompt">root@validator:~#</span>
                <input type="text" id="commandInput" autocomplete="off" autofocus>
                <span class="cursor"></span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const terminalContent = document.getElementById('terminalContent');
            const connectionStatus = document.getElementById('connectionStatus');
            const lastUpdate = document.getElementById('lastUpdate');
            const commandInput = document.getElementById('commandInput');
            
            let authData = null;
            let lineCount = 0;
            
            
            function initMatrix() {
                const canvas = document.getElementById('matrixCanvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                const chars = "01";
                const charArray = chars.split("");
                const fontSize = 14;
                const columns = canvas.width / fontSize;
                const drops = [];
                
                for(let i = 0; i < columns; i++) {
                    drops[i] = 1;
                }
                
                function draw() {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.04)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = "#0f0";
                    ctx.font = `${fontSize}px monospace`;
                    
                    for(let i = 0; i < drops.length; i++) {
                        const text = charArray[Math.floor(Math.random() * charArray.length)];
                        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                        
                        if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                            drops[i] = 0;
                        }
                        
                        drops[i]++;
                    }
                }
                
                setInterval(draw, 35);
                
                window.addEventListener('resize', function() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                });
            }
            
           
            function addLine(text, className = '') {
                const line = document.createElement('div');
                line.className = `line ${className}`;
                line.innerHTML = text;
                terminalContent.appendChild(line);
                terminalContent.scrollTop = terminalContent.scrollHeight;
                lineCount++;
                return line;
            }
            
           
            function formatTimestamp(isoString) {
                if (!isoString) return 'UNKNOWN';
                const date = new Date(isoString);
                return date.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                }).replace(/\//g, '-');
            }
            
           
            function typeWriter(element, text, speed = 30) {
                let i = 0;
                element.innerHTML = '';
                
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                        setTimeout(type, speed);
                        terminalContent.scrollTop = terminalContent.scrollHeight;
                    }
                }
                
                type();
            }
            
           
            async function fetchAuthData() {
                try {
                    connectionStatus.textContent = "● CONNECTING...";
                    connectionStatus.className = "status blink";
                    
                    addLine('<span class="prompt">></span> INITIATING CONNECTION TO AUTHORIZED SOURCE...', 'loading');
                    addLine('<span class="prompt">></span> TARGET: https://www.tianbin.org/api/index.json');
                    
                    const response = await fetch('https://www.tianbin.org/api/index.json');
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ERROR ${response.status}`);
                    }
                    
                    authData = await response.json();
                   
               
                    connectionStatus.textContent = "● CONNECTED";
                    connectionStatus.className = "status connected";
                    
                  
                    lastUpdate.textContent = `LAST UPDATE: ${formatTimestamp(new Date().toISOString())}`;
                    
                   
                    addLine('<span class="prompt">></span> CONNECTION ESTABLISHED SUCCESSFULLY', 'success');
                    addLine('<span class="prompt">></span> DATA RECEIVED FROM AUTHORIZED SOURCE', 'success');
                    
                    
                    renderDomains(authData);
                    
                   
                    updateTokenInfo(authData);
                    
                    return authData;
                } catch (error) {
                    console.error('FETCH ERROR:', error);
                    connectionStatus.textContent = "● DISCONNECTED";
                    connectionStatus.className = "status disconnected";
                    
                    addLine(`<span class="prompt">></span> CONNECTION FAILED: ${error.message}`, 'error');
                    addLine('<span class="prompt">></span> UNABLE TO VERIFY DOMAINS - RETRYING IN 10 SECONDS...', 'error');
                    
                   
                    setTimeout(fetchAuthData, 10000);
                    
                    return null;
                }
            }
            
         
            function renderDomains(data) {
                if (!data || !data.official_domains) {
                    addLine('<span class="prompt">></span> ERROR: NO DOMAIN LIST FOUND IN DATA', 'error');
                    return;
                }
                
                addLine('<span class="prompt">></span> LOADING OFFICIAL DOMAIN LIST...', 'loading');
                addLine(`<span class="prompt">></span> FOUND ${data.official_domains.length} REGISTERED DOMAINS`);
                addLine('');
                
                data.official_domains.forEach((domain, index) => {
                    setTimeout(() => {
                        const token = data.tokens[domain] || 'NO_TOKEN';
                        const domainLine = addLine(`<span class="prompt">[${index + 1}]</span> <span class="domain-name">${domain}</span> <span class="domain-status pending">VERIFYING...</span>`);
                        
                      
                        setTimeout(() => {
                            const statusElement = domainLine.querySelector('.domain-status');
                            statusElement.textContent = 'VERIFIED';
                            statusElement.className = 'domain-status verified';
                            
                     
                            addLine(`    ├─ TOKEN: <code>${token.substring(0, 8)}...${token.substring(token.length - 8)}</code>`);
                            addLine(`    └─ STATUS: <span class="success">AUTHENTICATED</span>`);
                        }, 800 + Math.random() * 1200);
                    }, index * 300);
                });
                
                setTimeout(() => {
                    addLine('');
                    addLine('<span class="prompt">></span> ALL DOMAINS VERIFIED SUCCESSFULLY', 'success');
                    addLine('<span class="prompt">></span> SYSTEM READY FOR OPERATION');
                }, data.official_domains.length * 300 + 1500);
            }
            
          
            function updateTokenInfo(data) {
                if (!data || !data.tokens) {
                    addLine('<span class="prompt">></span> WARNING: NO TOKEN DATA AVAILABLE', 'error');
                    return;
                }
                
                setTimeout(() => {
                    addLine('');
                    addLine('<span class="prompt">></span> TOKEN VERIFICATION DATA:');
                    
                    Object.entries(data.tokens).forEach(([domain, token], index) => {
                        setTimeout(() => {
                            addLine(`    [${index + 1}] ${domain}:`);
                            addLine(`        HASH: ${token}`);
                            addLine(`        LENGTH: ${token.length} CHARS`);
                            addLine(`        ALGORITHM: SHA-256`);
                        }, index * 200);
                    });
                }, 2000);
            }
            
           
            function handleCommand(command) {
                const cmd = command.trim().toLowerCase();
                
                addLine(`<span class="prompt">root@validator:~#</span> ${command}`);
                
                switch(cmd) {
                    case 'help':
                        addLine('AVAILABLE COMMANDS:');
                        addLine('  help     - SHOW THIS HELP MESSAGE');
                        addLine('  clear    - CLEAR TERMINAL SCREEN');
                        addLine('  refresh  - REFRESH DOMAIN VALIDATION');
                        addLine('  status   - SHOW SYSTEM STATUS');
                        addLine('  domains  - LIST ALL DOMAINS');
                        addLine('  exit     - CLOSE TERMINAL (DISABLED)');
                        break;
                        
                    case 'clear':
                        terminalContent.innerHTML = '';
                        lineCount = 0;
                        addLine('<span class="prompt">></span> TERMINAL CLEARED');
                        break;
                        
                    case 'refresh':
                        addLine('<span class="prompt">></span> INITIATING MANUAL REFRESH...');
                        fetchAuthData();
                        break;
                        
                    case 'status':
                        addLine('<span class="prompt">></span> SYSTEM STATUS:');
                        addLine(`    CONNECTION: ${connectionStatus.textContent}`);
                        addLine(`    LAST UPDATE: ${lastUpdate.textContent.replace('LAST UPDATE: ', '')}`);
                        addLine(`    DOMAINS LOADED: ${authData ? authData.official_domains.length : 'N/A'}`);
                        addLine(`    SYSTEM TIME: ${formatTimestamp(new Date().toISOString())}`);
                        break;
                        
                    case 'domains':
                        if (authData && authData.official_domains) {
                            addLine('<span class="prompt">></span> OFFICIAL DOMAINS:');
                            authData.official_domains.forEach((domain, index) => {
                                addLine(`    [${index + 1}] ${domain}`);
                            });
                        } else {
                            addLine('<span class="prompt">></span> NO DOMAIN DATA AVAILABLE', 'error');
                        }
                        break;
                        
                    case 'exit':
                        addLine('<span class="prompt">></span> TERMINAL CANNOT BE CLOSED - SYSTEM CRITICAL', 'error');
                        break;
                        
                    default:
                        if (cmd) {
                            addLine(`<span class="prompt">></span> COMMAND NOT FOUND: ${command}`, 'error');
                            addLine('<span class="prompt">></span> TYPE "help" FOR AVAILABLE COMMANDS');
                        }
                }
                
              
                commandInput.value = '';
            }
            
          
            function initTerminal() {
                
                addLine('<span class="prompt">></span> BOOTING SYSTEM TERMINAL v68...');
                addLine('<span class="prompt">></span> INITIALIZING SECURE CONNECTION MODULE...');
                addLine('<span class="prompt">></span> LOADING CRYPTOGRAPHIC LIBRARIES...');
                addLine('<span class="prompt">></span> STARTING DOMAIN VALIDATION SERVICE...');
                addLine('');
                addLine('<span class="prompt">></span> SYSTEM READY');
                addLine('<span class="prompt">></span> TYPE "help" FOR AVAILABLE COMMANDS');
                addLine('');
                
                
                setTimeout(fetchAuthData, 1500);
            } 
commandInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    handleCommand(this.value);
                }
            });
document.addEventListener('click', function() {
                commandInput.focus();
            });
            initMatrix();
            initTerminal();
     setInterval(fetchAuthData, 90);
            setInterval(() => {
                if (document.activeElement !== commandInput) {
                    commandInput.focus();
                }
            }, 1000);
        });
    </script>
</body>
</html>
