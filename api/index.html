<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DOMAIN VALIDATOR</title><style>*,::before,::after{box-sizing:border-box}body{margin:0;background:#000;color:#0f0;font-family:'Consolas','Monaco',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.terminal{width:100vw;height:100vh;display:flex;flex-direction:column}.header{background:#001100;border-bottom:1px solid #0f0;padding:8px 15px;display:flex;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100}.title{font-size:1.1rem;font-weight:bold;text-shadow:0 0 10px #0f0}.status{padding:3px 8px;border:1px solid #0f0}.status.connected{color:#0f0;animation:pulse 2s infinite}.status.disconnected{color:#f00;border-color:#f00}.content{flex:1;padding:60px 20px 80px;overflow-y:auto;font-size:0.95rem;line-height:1.4}.content::-webkit-scrollbar{width:10px;background:#000}.content::-webkit-scrollbar-thumb{background:#0f0}.line{margin-bottom:5px;white-space:pre-wrap;word-break:break-all}.prompt{color:#0f0;font-weight:bold}.cursor{display:inline-block;width:8px;height:16px;background:#0f0;animation:blink 1s infinite;margin-left:2px}.domain-item{padding:3px 0;border-left:2px solid #0f0;padding-left:10px;margin:5px 0}.domain-name{color:#0f0;font-weight:bold}.domain-status{padding:2px 6px;margin-left:10px;display:inline-block;font-size:0.85rem}.domain-status.verified{color:#0f0;border:1px solid #0f0}.domain-status.pending{color:#ff0;border:1px solid #ff0}.domain-status.failed{color:#f00;border:1px solid #f00}.footer{position:fixed;bottom:0;left:0;right:0;padding:8px 15px;background:#001100;border-top:1px solid #0f0;display:flex;justify-content:space-between;z-index:100}.timestamp{font-size:0.8rem;color:#0a0}.input-line{display:flex;align-items:center}.input-prompt{color:#0f0;margin-right:8px}#commandInput{background:transparent;border:none;color:#0f0;font-family:inherit;font-size:inherit;outline:none;flex-grow:1;caret-color:#0f0}@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}.scan-line{position:fixed;top:0;left:0;width:100%;height:2px;background:linear-gradient(transparent,rgba(0,255,0,.3),transparent);animation:scan 8s linear infinite;z-index:99;pointer-events:none}@keyframes scan{0%{top:0}100%{top:100%}}</style></head><body><div class="scan-line"></div><div class="terminal"><div class="header"><div class="title">[ SYSTEM TERMINAL v68 ]</div><div class="status connected" id="connectionStatus">● CONNECTED</div></div><div class="content" id="terminalContent"></div><div class="footer"><div class="timestamp" id="lastUpdate">UPDATING...</div><div class="input-line"><span class="input-prompt">root@validator:~#</span><input type="text" id="commandInput" autocomplete="off" autofocus><span class="cursor"></span></div></div></div><script>document.addEventListener('DOMContentLoaded',function(){const t=document.getElementById('terminalContent'),e=document.getElementById('connectionStatus'),n=document.getElementById('lastUpdate'),o=document.getElementById('commandInput'),i=['https://www.tianbin.org/api/index.json','https://wentianyou.com/api/index.json','https://bintian.net/api/index.json','https://wentianplays.com/api/index.json','https://wentianwan.com/api/index.json','https://wentianplay.net/api/index.json'];function s(e,n=''){const o=document.createElement('div');return o.className=`line ${n}`,o.innerHTML=e,t.appendChild(o),t.scrollTop=t.scrollHeight,o}async function c(){e.textContent='● FETCHING...',e.className='status disconnected',s('<span class="prompt">></span> FETCHING ALL ENDPOINTS...','loading');try{const n=await Promise.all(i.map(async t=>{try{const e=await fetch(t,{cache:'no-store'});return{url:t,ok:e.ok,data:e.ok?await e.json():null}}catch(n){return{url:t,ok:!1,data:null}}}));if(s(`<span class="prompt">></span> RESULTS:`),n.forEach(n=>{const o=n.url.replace('https://','').replace('/a
